server {
    listen 80;                     # accept HTTP connections on port 80
    server_name _;                 # match any hostname — no virtual-host routing needed here
    root /usr/share/nginx/html;    # directory containing the compiled React build
    index index.html;              # default file served when a directory is requested

    # React Router (or any client-side router) — fall back to index.html
    location / {
        try_files $uri /index.html;  # serve the requested file if it exists, else hand off to React's router
    }

    # Browser only ever talks to this origin; nginx forwards API calls
    # internally to the api container over the docker network.
    location /api/ {
        proxy_pass http://api:8000/;                            # forward requests under /api/ to the "api" service
        proxy_set_header Host $host;                             # preserve the original Host header for the backend
        proxy_set_header X-Real-IP $remote_addr;                  # pass along the real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # append this hop to the forwarding chain
    }

    gzip on;                                                     # enable gzip compression for responses
    gzip_types text/css application/javascript application/json; # only compress these text-based content types
}
